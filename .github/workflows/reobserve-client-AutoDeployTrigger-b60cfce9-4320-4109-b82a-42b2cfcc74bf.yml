name: Trigger auto deployment for reobserve-client

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/reobserve-client-AutoDeployTrigger-b60cfce9-4320-4109-b82a-42b2cfcc74bf.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.REOBSERVECLIENT_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.REOBSERVECLIENT_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.REOBSERVECLIENT_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: reobserve.azurecr.io
          registryUsername: ${{ secrets.REOBSERVECLIENT_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.REOBSERVECLIENT_REGISTRY_PASSWORD }}
          containerAppName: reobserve-client
          resourceGroup: ReObserve
          imageToBuild: reobserve.azurecr.io/reobserve-client:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


